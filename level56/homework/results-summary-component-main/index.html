<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="parent">

    <div id="first">
      <h1>Your Result</h1>

      <div id="circle">
        <p id="p1">76</p>
        <p id="p2">of 100</p>
      </div>

      <p id="p3">Great</p>

      <p class="description">
        <span class="line">You scored higher than 65% of </span>
        <span class="line">the people who have taken</span>
        <span class="line">these tests.</span>
      </p>
    </div>

    <div class="summary-card">
      <h2>Summary</h2>

      <div class="stat-item reaction">
        <div class="category-info">
          <img src="assets/images/icon-reaction.svg" alt="Reaction Icon" class="category-icon">
          <span id="react">Reaction</span>
        </div>
        <span class="score"><b>80</b> / 100</span>
      </div>

      <div class="stat-item memory">
        <div class="category-info">
          <img src="assets/images/icon-memory.svg" alt="Memory Icon" class="category-icon">
          <span id="memor">Memory</span>
        </div>
        <span class="score"><b>92</b> / 100</span>
      </div>

      <div class="stat-item verbal">
        <div class="category-info">
          <img src="assets/images/icon-verbal.svg" alt="Verbal Icon" class="category-icon">
          <span id="ver">Verbal</span>
        </div>
        <span class="score"><b>61</b> / 100</span>
      </div>

      <div class="stat-item visual">
        <div class="category-info">
          <img src="assets/images/icon-visual.svg" alt="Visual Icon" class="category-icon">
          <span id="visa">Visual</span>
        </div>
        <span class="score"><b>73</b> / 100</span>
      </div>

      <button class="continue-btn">Continue</button>
    </div>

  </div>
</body>
</html>
