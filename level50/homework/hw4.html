<!-- 1. display: flex 
შვილ ელემენტებს აყენებს ჰორიზონტალურად (X ღერძზე). 

 2. flex-direction 
 განსაზღვრავს ელემენტების მიმართულებას X ღერძზე.
   row → მარცხნიდან მარჯვნივ
   row-reverse → მარჯვნიდან მარცხნივ 

 3. justify-content 
 ელემენტებს ანაწილებს X ღერზე
   flex-start → მარცხენა მხარეს
   flex-end → მარჯვენა მხარეს
   center → შუაში
   space-between → ელემენტებს შორის თანაბარი დაშორება
   space-around → თითო ელემენტს ირგვლივ სივრცე
   space-evenly → ყველგან თანაბარი დაშორება 

4. gap 
განსაზღვრავს დაშორებას ელემენტებს შორის X ღერძზე 

5. flex-wrap 
განსაზღვრავს გადავა თუ არა ელემენტები ახალ ხაზზე,
   როცა ადგილი აღარ არის X ღერძზე.
   nowrap → არ გადადის
   wrap → გადადის
