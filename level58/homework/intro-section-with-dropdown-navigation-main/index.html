<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Intro section with dropdown navigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="body">
    <header>
      <div id="headerdiv">
        <h2>snap</h2>
        <nav>
          <ol>
            <li>Features <img src="images/icon-arrow-down.svg"></li>
            <li>Company <img src="images/icon-arrow-down.svg"></li>
            <li>Careers</li>
            <li>About</li>
          </ol>
        </nav>
      </div>
        <div id="buttondiv">
          <button id="login">Login</button>
          <button id="register">Register</button>
        </div>
    </header>

    <div class="maindiv">
      <div class="textdiv">
        <h1>Make <br> remote work</h1>
        <p>Get your team in sync, no matter your location. Streamline processes, 
  create team rituals, and watch productivity soar.</p>
        <button id="learn">Learn more</button>
        <div class="imgdiv">
          <img src="./images/client-databiz.svg">
          <img src="./images/client-audiophile.svg">
          <img src="./images/client-meet.svg">
          <img src="./images/client-maker.svg">
        </div>
      </div>
      <img src="./images/image-hero-desktop.png" id="mainimg">
    </div>
  </div>
</body>
</html>
